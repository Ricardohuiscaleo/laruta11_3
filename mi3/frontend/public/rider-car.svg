<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Shadow/orientation cone (like Google Maps blue cone) -->
  <path d="M32 0 L20 28 Q32 24 44 28 Z" fill="rgba(66,133,244,0.25)"/>
  <!-- Car body -->
  <rect x="18" y="20" width="28" height="38" rx="8" fill="#1a1a1a"/>
  <!-- Roof -->
  <rect x="22" y="26" width="20" height="14" rx="4" fill="#333"/>
  <!-- Windshield -->
  <rect x="24" y="28" width="16" height="8" rx="2" fill="#5a8fd4"/>
  <!-- Rear window -->
  <rect x="24" y="46" width="16" height="6" rx="2" fill="#5a8fd4"/>
  <!-- Headlights -->
  <rect x="22" y="21" width="6" height="3" rx="1.5" fill="#fbbf24"/>
  <rect x="36" y="21" width="6" height="3" rx="1.5" fill="#fbbf24"/>
  <!-- Taillights -->
  <rect x="22" y="55" width="6" height="3" rx="1.5" fill="#ef4444"/>
  <rect x="36" y="55" width="6" height="3" rx="1.5" fill="#ef4444"/>
  <!-- Side mirrors -->
  <rect x="14" y="30" width="5" height="4" rx="2" fill="#1a1a1a"/>
  <rect x="45" y="30" width="5" height="4" rx="2" fill="#1a1a1a"/>
  <!-- Wheels -->
  <rect x="15" y="22" width="5" height="10" rx="2.5" fill="#444"/>
  <rect x="44" y="22" width="5" height="10" rx="2.5" fill="#444"/>
  <rect x="15" y="46" width="5" height="10" rx="2.5" fill="#444"/>
  <rect x="44" y="46" width="5" height="10" rx="2.5" fill="#444"/>
</svg>
