<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú La Ruta 11 - TV Mode</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Impact, Arial, sans-serif; 
      background: #f5f5f5; /* Gris más claro para mayor luminosidad */
      color: #333;
      overflow: hidden; 
      height: 100vh;
      width: 100vw;
    }
    
    #menu-container { 
      padding: 3px;
      height: calc(100vh - 60px); /* Header ~33px + Footer ~25px */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .layout-split {
      display: flex;
      flex: 1;
      gap: 2px;
      overflow: hidden;
    }

    /* COLUMNAS */
    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.02);
      border-radius: 2px;
      padding: 1px;
      overflow: hidden;
    }
    
    /* PIE DE PÁGINA FIJO (BOTTOM BAR) */
    #main-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100vw;
      display: flex;
      gap: 3px;
      padding: 0 3px 3px 3px;
      z-index: 100;
      background: #f5f5f5;
    }
    .footer-panel {
      background: #ff6b00;
      color: white;
      text-align: center;
      padding: 4px;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 0.7vw;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
      flex: 1;
      border-radius: 3px;
    }
    .footer-panel.right { flex: 0.68; }


    .products-grid { 
      display: grid; 
      grid-template-columns: repeat(8, 1fr); /* 8 columnas de alimentos */
      gap: 1px;
      overflow-y: auto;
      flex: 1;
      align-content: start; 
      grid-auto-rows: min-content; 
    }

    .column-right { flex: 0.68; } /* Reducido un 20% aprox el ancho total */
    .column-right .products-grid {
      grid-template-columns: repeat(8, 1fr); /* 8 columnas de bebidas */
      align-content: start;
      grid-auto-rows: min-content;
    }

    /* SCROLLBARS (Minimalist) */
    .products-grid::-webkit-scrollbar { width: 4px; }
    .products-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    
    /* CARDS NEUMORFISMO */
    .product-card { 
      background: #ffffff; 
      border: 2px solid transparent; 
      border-radius: 4px; 
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
      aspect-ratio: 1/1.3; 
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      margin: 1px;
    }
    
    /* EFECTO DE SELECCIÓN (BORDE NARANJA ELEGANTE) */
    .product-card.focused { 
      background-color: #ffffff !important; 
      outline: 5px solid #ff6b00; /* Borde naranja sólido */
      outline-offset: -5px; /* Para que el borde no mueva el layout */
      box-shadow: 0 0 25px rgba(255, 107, 0, 0.4);
      z-index: 50;
      transform: none !important;
    }
    .product-card.focused .product-name { color: #111827 !important; }
    .product-card.focused .product-price { color: #059669 !important; }

    .product-image { 
        width: 100%; 
        height: 50%; 
        object-fit: cover; 
        transition: transform 0.3s ease;
    }
    .product-image-placeholder { 
      width: 100%; 
      height: 50%; 
      background: transparent; /* Antes era #eee, ahora permite ver el amarillo */
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 1.5vw; 
    }
    
    .product-content { 
      padding: 4px; 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      background: transparent; 
      text-align: center; 
    }
    .product-name { 
      font-size: 0.75vw; 
      font-weight: 900; 
      color: #0f172a; 
      line-height: 1.1; 
      text-transform: uppercase; 
      overflow: hidden; 
      display: -webkit-box; 
      -webkit-line-clamp: 2; 
      line-clamp: 2; 
      -webkit-box-orient: vertical; 
      word-break: break-word;
      margin-bottom: 1px;
    }
    .product-price { 
      font-size: 1.1vw; 
      font-weight: 900; 
      color: #059669; 
    }
    
    /* ESTILO BEBIDAS: BLANCO SLIM */
    .card-drink {
      aspect-ratio: 1/1.62 !important; 
      /* Hereda background de .product-card */
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
    .card-drink .product-image { 
      height: 75% !important; /* Altura fija para que el precio no se mueva */
      width: 100% !important; 
      object-fit: contain !important;
      margin: 5px auto 0;
      mix-blend-mode: multiply; 
      border: none !important;
    }
    .card-drink .product-content {
      height: 25% !important; /* Espacio reservado para el precio */
      background: transparent;
      border: none;
      padding: 5px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-drink .product-price { 
      font-size: 1.2vw !important; 
      color: #059669;
      margin: 0 !important;
    }

    /* HEADER PRINCIPAL */
    #main-header {
      background: #111827;
      color: white;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      z-index: 100;
      position: sticky;
      top: 0;
    }
    .logo-header {
      height: 25px;
      object-fit: contain;
    }
    .header-text {
      font-size: 1vw;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* MODAL */
    .fullscreen-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.95);
      z-index: 9999;
      align-items: center; justify-content: center;
    }
    .fullscreen-modal.active { display: flex; }
    .fullscreen-content { width: 90vw; height: 80vh; background: white; border-radius: 20px; display: flex; overflow: hidden; position: relative; color: #000; }
    .fullscreen-image { width: 50%; height: 100%; object-fit: cover; }
    .fullscreen-details { width: 50%; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
    .fullscreen-id { font-size: 1vw; color: #64748b; font-weight: bold; margin-bottom: 10px; }
    .fullscreen-name { font-size: 4vw; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; line-height: 1; }
    .fullscreen-price { font-size: 5vw; font-weight: 900; color: #059669; margin-bottom: 40px; }
    
    .modal-actions { display: flex; gap: 20px; width: 100%; }
    .modal-btn {
      flex: 1;
      padding: 20px;
      font-size: 1.5vw;
      font-weight: 900;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-primary { background: #ff6b00; color: white; }
    
    .modal-btn.focused {
      outline: 5px solid #3b82f6; /* Azul para resaltar foco en botones */
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
    }
    
    .close-fullscreen { position: absolute; top: 20px; right: 20px; font-size: 40px; background: #000; color: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }

  </style>
</head>
<body>
  <header id="main-header">
    <img src="icon.ico" alt="La Ruta 11" class="logo-header">
    <div class="header-text">La Ruta 11 Foodtrucks | <span style="color:#ff6b00;">Menú</span></div>
  </header>
  
  <div id="menu-container">
    <div id="menu-content" class="loading">SINTONIZANDO MENÚ...</div>
  </div>

  <footer id="main-footer">
    <div class="footer-panel">Nuestros productos</div>
    <div class="footer-panel right">Elije tu bebida</div>
  </footer>
  
  <script>
    const categories = {
      2: { name: 'Sandwiches', emoji: '🥪' },
      3: { name: 'Hamburguesas', emoji: '🍔' },
      4: { name: 'Completos', emoji: '🌭' },
      12: { name: 'Papas', emoji: '🍟' },
      8: { name: 'Combos', emoji: '🍽️' },
      11: { name: 'Bebidas', emoji: '🥤' },
      10: { name: 'Café & Té', emoji: '☕' }
    };
    
    let allProductsGlobal = [];
    let currentNavIndex = 0;
    let isPlaying = false;
    let autoplayInterval = null;

    async function loadMenu() {
      try {
        const response = await fetch('/api/get_productos.php');
        const products = await response.json();
        
        if (!Array.isArray(products)) throw new Error('Formato inválido');
        
        const menuProducts = products.filter(p => {
          const catId = parseInt(p.category_id);
          const subcatId = parseInt(p.subcategory_id);
          return p.is_active == 1 && ([2, 3, 4, 8, 12].includes(catId) || catId === 5);
        });
        
        const allProducts = menuProducts.map(product => {
          const catId = parseInt(product.category_id);
          const subcatId = parseInt(product.subcategory_id);
          let categoryKey = catId;
          
          if (catId === 12 || (catId === 5 && subcatId === 9)) categoryKey = 12;
          else if (catId === 5 && (subcatId === 10 || subcatId === 11)) categoryKey = 11;
          else if (catId === 5 && (subcatId === 27 || subcatId === 28)) categoryKey = 10;
          
          return {
            ...product,
            categoryKey,
            categoryName: categories[categoryKey]?.name || 'Otros'
          };
        });
        
        const order = [3, 2, 4, 12, 8, 11, 10];
        allProducts.sort((a, b) => order.indexOf(a.categoryKey) - order.indexOf(b.categoryKey));
        
        allProductsGlobal = allProducts;
        renderGrid();
        
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('menu-content').innerHTML = '<p style="text-align:center;color:#ef4444;">Error al cargar el menú</p>';
      }
    }
    
    function renderGrid() {
      // Separar alimentos de bebidas
      const foodProducts = allProductsGlobal.filter(p => [2, 3, 4, 12, 8].includes(p.categoryKey));
      let drinkProducts = allProductsGlobal.filter(p => [11, 10].includes(p.categoryKey));

      /**
       * Función para extraer gramos/cc/ml de un producto
       */
      const getVolume = (p) => {
          // 1. Prioridad: Campo 'grams' de la DB
          if (p.grams && !isNaN(p.grams) && p.grams > 0) return parseFloat(p.grams);
          
          // 2. Respaldo: Buscar en el nombre o descripción (ej: "350ml", "1.5L")
          const textToSearch = (p.name + " " + (p.description || "")).toLowerCase();
          const match = textToSearch.match(/(\d+(?:\.\d+)?)\s*(l|cc|ml|g|gr)/i);
          if (match) {
              let val = parseFloat(match[1]);
              if (match[2] === 'l') val *= 1000;
              return val;
          }
          return 0;
      };

      // Ordenar bebidas de mayor a menor volumen/gramaje
      drinkProducts.sort((a, b) => getVolume(b) - getVolume(a));

      // ¡CLAVE! Sincronizamos la lista global con el orden EXACTO que vamos a mostrar
      allProductsGlobal = [...foodProducts, ...drinkProducts];

      const renderCard = (product, totalIndex, isDrink) => `
        <div class="product-card ${isDrink ? 'card-drink' : ''}" 
             data-index="${totalIndex}" 
             data-id="${product.id}"
             onclick="openProductById(${product.id})">
          ${product.image_url ? 
            `<img src="${product.image_url}" alt="${product.name}" class="product-image" 
                  onload="${isDrink ? 'autoNormalizeImage(this)' : ''}"
                  onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
             <div class="product-image-placeholder" style="display:none;">🍽️</div>` :
            `<div class="product-image-placeholder">🍽️</div>`
          }
          <div class="product-content">
            ${isDrink ? '' : `<div class="product-name">${product.name}</div>`}
            <div class="product-price">$${new Intl.NumberFormat('es-CL').format(product.price)}</div>
          </div>
        </div>
      `;

      const htmlFood = foodProducts.map((p, index) => renderCard(p, index, false)).join('');
      const htmlDrinks = drinkProducts.map((p, index) => renderCard(p, foodProducts.length + index, true)).join('');

      document.getElementById('menu-content').innerHTML = `
        <div class="layout-split">
          <div class="column column-left">
            <div class="products-grid" id="gridFood">${htmlFood}</div>
          </div>
          <div class="column column-right">
            <div class="products-grid" id="gridDrinks">${htmlDrinks}</div>
          </div>
        </div>
      `;

      updateFocus(currentNavIndex);
    }

    function autoNormalizeImage(img) {
        if (!img.complete || img.naturalWidth === 0) return;
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        try {
            ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
            let found = false;
            for (let y = 0; y < canvas.height; y++) {
                for (let x = 0; x < canvas.width; x++) {
                    const i = (y * canvas.width + x) * 4;
                    if (data[i+3] > 50 && (data[i] < 240 || data[i+1] < 240 || data[i+2] < 240)) {
                        if (x < minX) minX = x; if (x > maxX) maxX = x;
                        if (y < minY) minY = y; if (y > maxY) maxY = y;
                        found = true;
                    }
                }
            }
            if (found) {
                const s = Math.min(canvas.width/(maxX-minX), canvas.height/(maxY-minY), 2.5) * 0.85;
                img.style.setProperty('--base-scale', s); // Guardamos la escala base
                img.style.transform = `scale(${s})`; // Escala inicial
            }
        } catch (e) { console.warn("CORS issue"); }
    }
    
    let modalButtonIndex = 1; // 0: Seguir mirando, 1: Pedir

    function openProductById(id) {
      const product = allProductsGlobal.find(p => parseInt(p.id) === parseInt(id));
      if (!product) return;

      modalButtonIndex = 1; // Default en 'Pedir'
      
      // Agregamos un estado al historial para el botón "Back" del control remoto
      history.pushState({ modalOpen: true }, "", "#product-" + id);

      const modal = document.createElement('div');
      modal.id = 'product-modal';
      modal.className = 'fullscreen-modal active';
      modal.innerHTML = `
        <div class="fullscreen-content">
          <div class="close-fullscreen" onclick="closeFullscreen()">×</div>
          ${product.image_url ? `<img src="${product.image_url}" class="fullscreen-image">` : `<div class="fullscreen-image">🍽️</div>`}
          <div class="fullscreen-details">
            <div class="fullscreen-id">ID PRODUCTO: ${product.id}</div>
            <div class="fullscreen-name">${product.name}</div>
            <div class="fullscreen-price">$${new Intl.NumberFormat('es-CL').format(product.price)}</div>
            
            <div class="modal-actions">
               <button class="modal-btn btn-secondary" onclick="closeFullscreen()">👀 Seguir mirando</button>
               <button class="modal-btn btn-primary focused" onclick="alert('¡Producto ${product.id} agregado al pedido!')">🛒 Pedir este producto</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    }

    // Listener para el botón físico "Back" de Android/Smart TV y botones del navegador
    window.addEventListener('popstate', function(event) {
        if (document.getElementById('product-modal')) {
            closeFullscreen(true); // El true indica que no necesitamos llamar a history.back otra vez
        }
    });

    function closeFullscreen(fromPopState = false) {
      const modal = document.getElementById('product-modal');
      if (modal) {
          modal.remove();
          // Si cerramos el modal manualmente (no por el botón atrás), limpiamos el historial
          if (!fromPopState) {
              history.back();
          }
      }
    }
    
    function handleKeyDown(e) {
      const modal = document.getElementById('product-modal');
      
      if (e.keyCode === 461 || e.key === "GoBack" || e.key === "Escape") {
          if (modal) { e.preventDefault(); closeFullscreen(); return; }
      }

      if (modal) {
        const btns = modal.querySelectorAll('.modal-btn');
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
            e.preventDefault();
            btns[modalButtonIndex].classList.remove('focused');
            modalButtonIndex = modalButtonIndex === 0 ? 1 : 0;
            btns[modalButtonIndex].classList.add('focused');
        }
        if (e.key === 'Enter') { e.preventDefault(); btns[modalButtonIndex].click(); }
        return;
      }

      if (!allProductsGlobal.length) return;
      
      const foodCount = allProductsGlobal.filter(p => [2, 3, 4, 12, 8].includes(p.categoryKey)).length;
      const cols = 8; 

      let currentIndex = Number(currentNavIndex);
      let nextIndex = currentIndex;
      
      const isDrink = currentIndex >= foodCount;
      const localIdx = isDrink ? currentIndex - foodCount : currentIndex;
      const currentCol = localIdx % cols;
      const currentRow = Math.floor(localIdx / cols);

      switch(e.key) {
        case 'ArrowRight':
          e.preventDefault();
          if (currentCol < (cols - 1)) {
              nextIndex = Math.min(currentIndex + 1, (isDrink ? allProductsGlobal.length - 1 : foodCount - 1));
          } else if (!isDrink) {
              // Único "salto" permitido: pasar de comida a bebidas en la misma fila
              let targetDrink = foodCount + (currentRow * cols);
              if (targetDrink < allProductsGlobal.length) nextIndex = targetDrink;
          }
          break;
        case 'ArrowLeft':
          e.preventDefault();
          if (currentCol > 0) {
              nextIndex = Math.max(currentIndex - 1, (isDrink ? foodCount : 0));
          } else if (isDrink) {
              // Volver de bebidas a comida en la misma fila
              let targetFood = (currentRow * cols) + 7;
              if (targetFood < foodCount) nextIndex = targetFood;
              else nextIndex = foodCount - 1; // Ir al último de comida si la fila no alcanza
          }
          break;
        case 'ArrowDown':
          e.preventDefault();
          let targetDown = currentIndex + cols;
          let maxSec = isDrink ? allProductsGlobal.length - 1 : foodCount - 1;
          if (targetDown <= maxSec) nextIndex = targetDown;
          break;
        case 'ArrowUp':
          e.preventDefault();
          let targetUp = currentIndex - cols;
          let minSec = isDrink ? foodCount : 0;
          if (targetUp >= minSec) nextIndex = targetUp;
          break;
        case 'Enter':
          e.preventDefault();
          if (allProductsGlobal[currentIndex]) openProductById(allProductsGlobal[currentIndex].id);
          break;
      }
      
      if (nextIndex !== currentIndex) updateFocus(nextIndex);
    }

    function updateFocus(index) {
      // Remover foco anterior
      const prevFocused = document.querySelector('.product-card.focused');
      if (prevFocused) prevFocused.classList.remove('focused');

      // Aplicar nuevo foco por el ID real del producto (data-index)
      currentNavIndex = index;
      const targetCard = document.querySelector(`.product-card[data-index="${index}"]`);
      
      if (targetCard) {
        targetCard.classList.add('focused');
        targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else {
          // Si por alguna razón el índice no existe (filtros), ir al primero disponible
          const firstCard = document.querySelector('.product-card');
          if (firstCard) {
              currentNavIndex = parseInt(firstCard.dataset.index);
              firstCard.classList.add('focused');
          }
      }
    }

    document.addEventListener('keydown', handleKeyDown);
    loadMenu();
  </script>
</body>
</html>
