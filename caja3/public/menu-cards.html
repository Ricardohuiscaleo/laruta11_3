<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú La Ruta 11 - TV Mode</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      color: white;
      overflow-x: hidden;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    #menu-container { padding: 60px; max-width: 100%; margin: 0 auto; min-height: 100vh; }
    
    .products-grid { 
      display: grid; 
      grid-template-columns: repeat(5, 1fr); 
      gap: 40px; 
      padding-bottom: 120px;
    }
    
    .product-card { 
      background: white; 
      border: 6px solid transparent; 
      border-radius: 24px; 
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.5);
      aspect-ratio: 1/1;
      scroll-margin: 180px;
      transform: scale(1);
    }
    
    .product-card.focused { 
      transform: scale(1.12); 
      border-color: #fbbf24; 
      box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.8), 0 0 40px rgba(251, 191, 36, 0.4);
      z-index: 50;
    }
    
    .smart-tag {
        position: absolute;
        top: 20px;
        right: 20px;
        background: #fbbf24;
        color: #000;
        padding: 8px 16px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 900;
        text-transform: uppercase;
        box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        z-index: 10;
        letter-spacing: 1px;
    }

    .product-image { width: 100%; height: 75%; object-fit: cover; }
    .product-image-placeholder { width: 100%; height: 75%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 80px; }
    
    .product-content { padding: 25px; flex: 1; display: flex; flex-direction: column; justify-content: center; background: white; text-align: center; }
    .product-name { font-size: 22px; font-weight: 900; color: #1e293b; line-height: 1.1; margin-bottom: 8px; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; }
    .product-price { font-size: 32px; font-weight: 900; color: #059669; }
    
    .loading { text-align: center; padding: 120px; color: #fff; font-size: 40px; font-weight: 900; }
    
    .fullscreen-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.98);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(15px);
    }
    
    .fullscreen-modal.active { display: flex; }
    
    .fullscreen-content {
      display: flex;
      width: 92vw;
      height: 88vh;
      background: white;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 30px 70px -15px rgba(0, 0, 0, 0.9);
      color: #1e293b;
    }
    
    .fullscreen-image {
      width: 50%;
      height: 100%;
      object-fit: cover;
      flex-shrink: 0;
    }
    
    .fullscreen-details {
      width: 50%;
      padding: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #fff;
    }
    
    .fullscreen-category {
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #fbbf24;
      margin-bottom: 25px;
      font-weight: 800;
      background: #000;
      display: inline-block;
      padding: 5px 15px;
      border-radius: 8px;
      width: fit-content;
    }
    
    .fullscreen-name {
      font-size: 84px;
      font-weight: 900;
      color: #0f172a;
      margin-bottom: 35px;
      line-height: 1;
      text-transform: uppercase;
    }
    
    .fullscreen-description {
      font-size: 38px;
      color: #475569;
      margin-bottom: 50px;
      line-height: 1.2;
    }
    
    .fullscreen-price {
      font-size: 100px;
      font-weight: 900;
      color: #059669;
    }
    
    .close-fullscreen {
      position: absolute;
      top: 40px;
      right: 40px;
      font-size: 60px;
      color: #fff;
      cursor: pointer;
      background: #0f172a;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      transition: all 0.2s;
    }

    .close-fullscreen:hover { transform: rotate(90deg); background: #ef4444; }
    
    .autoplay-controls {
      position: absolute;
      bottom: 40px;
      right: 40px;
      z-index: 100;
    }
    
    .autoplay-btn {
      font-size: 50px;
      cursor: pointer;
      background: #f1f5f9;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      color: #0f172a;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .autoplay-btn:hover { background: #fbbf24; color: #000; transform: scale(1.1); }
    
    @keyframes fastIn {
      from { transform: scale(0.7); opacity: 0; filter: blur(20px); }
      to { transform: scale(1); opacity: 1; filter: blur(0); }
    }
    
    .fullscreen-content.animate { animation: fastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  </style>
</head>
<body>
  <div id="menu-container">
    <div id="menu-content" class="loading">SINTONIZANDO MENÚ...</div>
  </div>
  
  <script>
    const categories = {
      2: { name: 'Sandwiches', emoji: '🥪' },
      3: { name: 'Hamburguesas', emoji: '🍔' },
      4: { name: 'Completos', emoji: '🌭' },
      12: { name: 'Papas', emoji: '🍟' },
      8: { name: 'Combos', emoji: '🍽️' },
      11: { name: 'Bebidas', emoji: '🥤' },
      10: { name: 'Café & Té', emoji: '☕' }
    };
    
    let allProductsGlobal = [];
    let currentNavIndex = 0;
    const gridCols = 5;
    let isPlaying = false;
    let autoplayInterval = null;

    async function loadMenu() {
      try {
        const response = await fetch('/api/get_productos.php');
        const products = await response.json();
        
        if (!Array.isArray(products)) {
          throw new Error('Formato de datos inválido');
        }
        
        const menuProducts = products.filter(p => {
          const catId = parseInt(p.category_id);
          const subcatId = parseInt(p.subcategory_id);
          return p.is_active == 1 && ([2, 3, 4, 8, 12].includes(catId) || (catId === 5 && subcatId === 9) || (catId === 5 && subcatId === 10) || (catId === 5 && subcatId === 11) || (catId === 5 && subcatId === 27) || (catId === 5 && subcatId === 28));
        });
        
        const allProducts = menuProducts.map(product => {
          const catId = parseInt(product.category_id);
          const subcatId = parseInt(product.subcategory_id);
          let categoryKey = catId;
          let tag = null;
          
          if (catId === 3) tag = "ESTRELLA";
          if (catId === 8) tag = "RECOMENDADO";
          if (product.price > 8000) tag = "PREMIUM";
          if (product.id % 7 === 0) tag = "NUEVO";
          
          if (catId === 12 || (catId === 5 && subcatId === 9)) {
            categoryKey = 12;
            tag = "HOT";
          } else if (catId === 5 && (subcatId === 10 || subcatId === 11)) {
            categoryKey = 11;
          } else if (catId === 5 && (subcatId === 27 || subcatId === 28)) {
            categoryKey = 10;
          }
          
          return {
            ...product,
            categoryKey,
            tag,
            categoryName: categories[categoryKey]?.name || 'Otros'
          };
        });
        
        const order = [3, 2, 4, 12, 8, 11, 10];
        allProducts.sort((a, b) => {
          const indexA = order.indexOf(a.categoryKey);
          const indexB = order.indexOf(b.categoryKey);
          return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
        });
        
        allProductsGlobal = allProducts;
        renderGrid();
        
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('menu-content').innerHTML = '<p style="text-align:center;color:#ef4444;">Error al cargar el menú</p>';
      }
    }
    
    function renderGrid() {
      let html = `
        <div class="products-grid">
          ${allProductsGlobal.map((product, idx) => `
            <div class="product-card ${idx === currentNavIndex ? 'focused' : ''}" data-index="${idx}" onclick="openFullscreen(allProductsGlobal[${idx}])">
              ${product.tag ? `<div class="smart-tag">${product.tag}</div>` : ''}
              ${product.image_url ? 
                `<img src="${product.image_url}" alt="${product.name}" class="product-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                 <div class="product-image-placeholder" style="display:none;">🍽️</div>` :
                `<div class="product-image-placeholder">🍽️</div>`
              }
              <div class="product-content">
                <div class="product-name">${product.name}</div>
                <div class="product-price">$${new Intl.NumberFormat('es-CL').format(product.price)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('menu-content').innerHTML = html;
      updateFocus(currentNavIndex);
    }
    
    function openFullscreen(product) {
      const modal = document.createElement('div');
      modal.className = 'fullscreen-modal active';
      modal.innerHTML = `
        <div class="fullscreen-content animate">
          <div class="close-fullscreen" onclick="closeFullscreen()">×</div>
          ${product.image_url ? 
            `<img src="${product.image_url}" class="fullscreen-image">` :
            `<div class="fullscreen-image" style="background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:200px;">🍽️</div>`
          }
          <div class="fullscreen-details">
            <div class="fullscreen-category">${product.categoryName}</div>
            <div class="fullscreen-name">${product.name}</div>
            ${product.description ? `<div class="fullscreen-description">${product.description}</div>` : ''}
            <div class="fullscreen-price">$${new Intl.NumberFormat('es-CL').format(product.price)}</div>
          </div>
          <div class="autoplay-controls">
            <button class="autoplay-btn" onclick="toggleAutoplay()" id="playPauseBtn">${isPlaying ? '⏸' : '▶'}</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    }
    
    function closeFullscreen() {
      const modal = document.querySelector('.fullscreen-modal');
      if (modal) modal.remove();
      if (autoplayInterval) {
        clearInterval(autoplayInterval);
        autoplayInterval = null;
      }
      isPlaying = false;
    }
    
    function toggleAutoplay() {
      isPlaying = !isPlaying;
      const btn = document.getElementById('playPauseBtn');
      if (isPlaying) {
        btn.textContent = '⏸';
        autoplayInterval = setInterval(() => {
          currentNavIndex = (currentNavIndex + 1) % allProductsGlobal.length;
          closeFullscreen();
          openFullscreen(allProductsGlobal[currentNavIndex]);
        }, 5000);
      } else {
        btn.textContent = '▶';
        clearInterval(autoplayInterval);
        autoplayInterval = null;
      }
    }
    
    function handleKeyDown(e) {
      if (document.querySelector('.fullscreen-modal')) {
        if (e.key === 'Escape' || e.key === 'Back' || e.key === 'MediaStop') {
          closeFullscreen();
        }
        return;
      }

      const cards = document.querySelectorAll('.product-card');
      if (!cards.length) return;

      let nextIndex = currentNavIndex;

      switch(e.key) {
        case 'ArrowRight':
          nextIndex = (currentNavIndex + 1) % cards.length;
          break;
        case 'ArrowLeft':
          nextIndex = (currentNavIndex - 1 + cards.length) % cards.length;
          break;
        case 'ArrowDown':
          nextIndex = Math.min(currentNavIndex + gridCols, cards.length - 1);
          break;
        case 'ArrowUp':
          nextIndex = Math.max(currentNavIndex - gridCols, 0);
          break;
        case 'Enter':
          openFullscreen(allProductsGlobal[currentNavIndex]);
          return;
      }

      if (nextIndex !== currentNavIndex) {
        updateFocus(nextIndex);
      }
    }

    function updateFocus(index) {
      const cards = document.querySelectorAll('.product-card');
      if (!cards[index]) return;
      cards[currentNavIndex].classList.remove('focused');
      currentNavIndex = index;
      cards[currentNavIndex].classList.add('focused');
      cards[currentNavIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    document.addEventListener('keydown', handleKeyDown);
    loadMenu();
  </script>
</body>
</html>
